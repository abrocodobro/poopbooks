<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="favicon-180x180.png">
    <title>EPUB Reader | Pooks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* 顶部栏变小 */
        header {
            background-color: #1e1e1e;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 100;
        }

        /* 书名加粗显示 */
        .book-title {
            font-size: 1rem;
            font-weight: 700; /* 加粗，700是标准加粗权重 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
            color: #ffffff;
        }

        .controls {
            display: flex;
            gap: 0.6rem;
        }

        .btn {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 0.35rem 0.8rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #444;
        }

        /* 阅读区域占满更多空间 */
        .reader-container {
            position: absolute;
            top: 46px;
            left: 0;
            right: 0;
            bottom: 56px;
            overflow: hidden;
            background-color: #121212;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        #viewer iframe {
            background-color: #121212 !important;
        }

        #viewer .epub-view {
            background-color: #121212 !important;
            color: #e0e0e0 !important;
        }

        #viewer .epub-view p {
            color: #e0e0e0 !important;
        }

        #viewer .epub-view h1,
        #viewer .epub-view h2,
        #viewer .epub-view h3,
        #viewer .epub-view h4,
        #viewer .epub-view h5,
        #viewer .epub-view h6 {
            color: #ffffff !important;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #999;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #333;
            border-top: 3px solid #8ab4f8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            padding: 2rem;
        }

        /* 底部翻页栏变小 */
        .bottom-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 90;
        }

        .read-controls {
            display: flex;
            gap: 1.2rem;
        }

        /* 翻页键改成按钮样式 */
        .read-btn {
            background-color: #333;
            color: #e0e0e0;
            border: none;
            width: 44px;
            height: 36px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .read-btn:hover {
            background-color: #444;
        }

        .toc-panel {
            position: fixed;
            top: 46px;
            right: 0;
            width: 280px;
            height: calc(100% - 102px);
            background: #1e1e1e;
            transform: translateX(100%);
            transition: transform 0.25s ease;
            overflow-y: auto;
            z-index: 80;
            padding: 1rem;
        }

        .toc-panel.show {
            transform: translateX(0);
        }

        .toc-title {
            font-size: 1rem;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #333;
            color: #fff;
        }

        .toc-list {
            list-style: none;
        }

        .toc-item {
            margin-bottom: 0.4rem;
        }

        .toc-item a {
            color: #e0e0e0;
            text-decoration: none;
            display: block;
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
        }

        .toc-item a:hover {
            background-color: #333;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 150;
            display: none;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>

<header>
    <div class="book-title" id="bookTitle">EPUB Reader</div>
    <div class="controls">
        <button class="btn" id="tocBtn">Content</button>
    </div>
</header>

<div class="reader-container">
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>Loading...</div>
    </div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="viewer"></div>
</div>

<div class="bottom-controls">
    <div class="read-controls">
        <button class="read-btn" id="prevBtn">←</button>
        <button class="read-btn" id="nextBtn">→</button>
    </div>
</div>

<div class="toc-panel" id="tocPanel">
    <div class="toc-title">Content</div>
    <ul class="toc-list" id="tocList"></ul>
</div>

<div class="overlay" id="overlay"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script>
    let book;
    let rendition;
    let currentLocation;
    let bookSpine = [];

    document.addEventListener('DOMContentLoaded', initReader);

    async function initReader() {
        try {
            const params = new URLSearchParams(window.location.search);
            const epubFile = params.get('file');
            const bookTitle = params.get('title') || '书籍';

            if (!epubFile) throw new Error('未指定EPUB文件');

            document.getElementById('bookTitle').textContent = bookTitle;
            await loadEpub(epubFile);
            document.getElementById('loading').style.display = 'none';
            bindControls();
            applyDarkMode();
        } catch (err) {
            console.error(err);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').innerText = '加载失败：' + err.message;
            document.getElementById('error').style.display = 'block';
        }
    }

    async function loadEpub(path) {
        try {
            book = ePub(path, { preserveWhitespace: true });
            book.loaded.spine.then(s => bookSpine = s);
            await book.ready;

            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                flow: "paginated",
                spreads: false
            });

            rendition.themes.register("dark", {
                "body": { background: "#121212", color: "#e0e0e0" },
                "p": { color: "#e0e0e0" },
                "h1,h2,h3,h4,h5,h6": { color: "#fff" }
            });
            rendition.themes.select("dark");

            await extractAndRenderToc();
            await rendition.display();

            rendition.on("locationChanged", loc => {
                currentLocation = loc;
                updateActiveToc(loc);
            });

        } catch (e) {
            const ab = await fetch(path).then(r => r.arrayBuffer());
            book = ePub(ab, { type: "binary" });
            await book.ready;
            bookSpine = book.spine.items || [];

            rendition = book.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated" });
            rendition.themes.register("dark", {
                "body": { background: "#121212", color: "#e0e0e0" },
                "p": { color: "#e0e0e0" }
            });
            rendition.themes.select("dark");

            await extractAndRenderToc();
            await rendition.display();

            rendition.on("locationChanged", loc => {
                currentLocation = loc;
                updateActiveToc(loc);
            });
        }
    }

    async function extractAndRenderToc() {
        let toc = [];
        try {
            toc = await book.toc || [];
            if (!toc.length && book.navigation) toc = book.navigation.toc || [];
            if (!toc.length) toc = generateTocFromSpine(bookSpine);
        } catch (e) {
            toc = generateTocFromSpine(bookSpine);
        }
        renderToc(toc);
    }

    function generateTocFromSpine(spine) {
        return spine.map((it, i) => ({
            label: `章节 ${i+1}`,
            href: it.href || it.id,
            cfi: it.cfi
        }));
    }

    function renderToc(toc) {
        const ul = document.getElementById('tocList');
        ul.innerHTML = '';
        if (!toc.length) {
            ul.innerHTML = '<li class="toc-item"><a>No content</a></li>';
            return;
        }

        function render(items, parent, depth = 0) {
            items.forEach(it => {
                if (!it.href && !it.cfi) return;
                const li = document.createElement('li');
                li.className = 'toc-item';
                li.style.paddingLeft = depth * 12 + 'px';
                const a = document.createElement('a');
                a.textContent = it.label || '章节';
                a.onclick = async e => {
                    e.preventDefault();
                    try {
                        if (it.cfi) await rendition.display(it.cfi);
                        else await rendition.display(it.href);
                    } catch {}
                    document.getElementById('tocPanel').classList.remove('show');
                    document.getElementById('overlay').classList.remove('show');
                };
                li.appendChild(a);
                parent.appendChild(li);
                if (it.subitems && it.subitems.length) {
                    render(it.subitems, parent, depth + 1);
                }
            });
        }

        render(toc, ul);
    }

    function updateActiveToc(loc) {
        if (!loc || !loc.start) return;
        const all = document.querySelectorAll('.toc-item');
        all.forEach(i => i.classList.remove('active'));
        const cur = loc.start.href || '';
        all.forEach(it => {
            const a = it.querySelector('a');
            if (cur.includes(a.textContent)) {
                it.classList.add('active');
            }
        });
    }

    function applyDarkMode() {
        setTimeout(() => {
            const ifs = document.querySelectorAll('#viewer iframe');
            ifs.forEach(ifr => {
                try {
                    const b = ifr.contentDocument.body;
                    b.style.background = '#121212';
                    b.style.color = '#e0e0e0';
                } catch {}
            });
        }, 500);
    }

    function bindControls() {
        document.getElementById('prevBtn').onclick = () => {
            rendition.prev();
            applyDarkMode();
        };

        document.getElementById('nextBtn').onclick = () => {
            rendition.next();
            applyDarkMode();
        };

        document.getElementById('tocBtn').onclick = () => {
            document.getElementById('tocPanel').classList.toggle('show');
            document.getElementById('overlay').classList.toggle('show');
        };

        document.getElementById('overlay').onclick = () => {
            document.getElementById('tocPanel').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        };

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') {
                rendition.prev();
                applyDarkMode();
            }
            if (e.key === 'ArrowRight') {
                rendition.next();
                applyDarkMode();
            }
            if (e.key === 'Escape') {
                document.getElementById('tocPanel').classList.remove('show');
                document.getElementById('overlay').classList.remove('show');
            }
        });
    }
</script>
</body>
</html>
